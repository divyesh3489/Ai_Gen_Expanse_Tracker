[tool.black]
line-length = 88
target-version = ["py310"]
exclude = '''
/(
    migrations
)/
'''
[tool.isort]
profile = "black"
line_length = 88
skip = ["migrations"]


[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true
plugins = ["mypy_django_plugin.main"]

[tool.django-stubs]
django_settings_module = "ExpanseTraker.settings"